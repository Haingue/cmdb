services:
  # ============================================================================
  # Kafka Cluster with KRaft (3 brokers) - No Zookeeper needed
  # ============================================================================

  # Kafka Broker 1 (Controller + Broker)
  kafka-broker-1:
    image: apache/kafka:4.2.1
    hostname: kafka-broker-1
    container_name: cmdb-kafka-1
    ports:
      - '9092:9092' # External broker port
      - '19092:19092' # Internal broker port
      - '29092:29092' # Controller port
    environment:
      # Node configuration
      KAFKA_NODE_ID: '1'
      KAFKA_PROCESS_ROLES: 'broker,controller'
      KAFKA_CONTROLLER_QUORUM_VOTERS: '1@kafka-broker-1:29092,2@kafka-broker-2:29092,3@kafka-broker-3:29092'
      KAFKA_CONTROLLER_LISTENER_NAMES: 'CONTROLLER'

      # Listeners configuration
      KAFKA_LISTENERS: 'BROKER://:9092,CONTROLLER://:29092'
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: 'BROKER:PLAINTEXT,CONTROLLER:PLAINTEXT'
      KAFKA_ADVERTISED_LISTENERS: 'BROKER://localhost:9092,CONTROLLER://kafka-broker-1:29092'
      KAFKA_INTER_BROKER_LISTENER_NAME: 'BROKER'

      # Cluster configuration
      KAFKA_CLUSTER_ID: 'cmdb-kafka-cluster'
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: '2'
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: '0'
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: '2'
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: '2'

      # Log configuration
      KAFKA_LOG_DIRS: '/var/lib/kafka/data'
      KAFKA_LOG_RETENTION_HOURS: '168'
      KAFKA_LOG_RETENTION_BYTES: '1073741824'

      # Performance
      KAFKA_NUM_PARTITIONS: '3'
      KAFKA_DEFAULT_REPLICATION_FACTOR: '2'

      # Enable topic auto-creation
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: 'true'

      # JVM settings
      KAFKA_HEAP_OPTS: '-Xmx512M -Xms512M'
    volumes:
      - ./data/kafka-1:/var/lib/kafka/data
    networks:
      - cmdb-kafka-net
    restart: unless-stopped
    healthcheck:
      test:
        [
          'CMD',
          'kafka-broker-api-versions',
          '--bootstrap-server',
          'localhost:9092',
        ]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  # Kafka Broker 2 (Controller + Broker)
  kafka-broker-2:
    image: apache/kafka:4.2.1
    hostname: kafka-broker-2
    container_name: cmdb-kafka-2
    ports:
      - '9093:9092' # External broker port
      - '19093:19092' # Internal broker port
      - '29093:29092' # Controller port
    environment:
      KAFKA_NODE_ID: '2'
      KAFKA_PROCESS_ROLES: 'broker,controller'
      KAFKA_CONTROLLER_QUORUM_VOTERS: '1@kafka-broker-1:29092,2@kafka-broker-2:29092,3@kafka-broker-3:29092'
      KAFKA_CONTROLLER_LISTENER_NAMES: 'CONTROLLER'

      KAFKA_LISTENERS: 'BROKER://:9092,CONTROLLER://:29092'
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: 'BROKER:PLAINTEXT,CONTROLLER:PLAINTEXT'
      KAFKA_ADVERTISED_LISTENERS: 'BROKER://localhost:9093,CONTROLLER://kafka-broker-2:29092'
      KAFKA_INTER_BROKER_LISTENER_NAME: 'BROKER'

      KAFKA_CLUSTER_ID: 'cmdb-kafka-cluster'
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: '2'
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: '0'
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: '2'
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: '2'

      KAFKA_LOG_DIRS: '/var/lib/kafka/data'
      KAFKA_LOG_RETENTION_HOURS: '168'
      KAFKA_LOG_RETENTION_BYTES: '1073741824'

      KAFKA_NUM_PARTITIONS: '3'
      KAFKA_DEFAULT_REPLICATION_FACTOR: '2'
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: 'true'

      KAFKA_HEAP_OPTS: '-Xmx512M -Xms512M'
    volumes:
      - ./data/kafka-2:/var/lib/kafka/data
    networks:
      - cmdb-kafka-net
    restart: unless-stopped
    healthcheck:
      test:
        [
          'CMD',
          'kafka-broker-api-versions',
          '--bootstrap-server',
          'localhost:9092',
        ]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  # Kafka Broker 3 (Controller + Broker)
  kafka-broker-3:
    image: apache/kafka:4.2.1
    hostname: kafka-broker-3
    container_name: cmdb-kafka-3
    ports:
      - '9094:9092' # External broker port
      - '19094:19092' # Internal broker port
      - '29094:29092' # Controller port
    environment:
      KAFKA_NODE_ID: '3'
      KAFKA_PROCESS_ROLES: 'broker,controller'
      KAFKA_CONTROLLER_QUORUM_VOTERS: '1@kafka-broker-1:29092,2@kafka-broker-2:29092,3@kafka-broker-3:29092'
      KAFKA_CONTROLLER_LISTENER_NAMES: 'CONTROLLER'

      KAFKA_LISTENERS: 'BROKER://:9092,CONTROLLER://:29092'
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: 'BROKER:PLAINTEXT,CONTROLLER:PLAINTEXT'
      KAFKA_ADVERTISED_LISTENERS: 'BROKER://localhost:9094,CONTROLLER://kafka-broker-3:29092'
      KAFKA_INTER_BROKER_LISTENER_NAME: 'BROKER'

      KAFKA_CLUSTER_ID: 'cmdb-kafka-cluster'
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: '2'
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: '0'
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: '2'
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: '2'

      KAFKA_LOG_DIRS: '/var/lib/kafka/data'
      KAFKA_LOG_RETENTION_HOURS: '168'
      KAFKA_LOG_RETENTION_BYTES: '1073741824'

      KAFKA_NUM_PARTITIONS: '3'
      KAFKA_DEFAULT_REPLICATION_FACTOR: '2'
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: 'true'

      KAFKA_HEAP_OPTS: '-Xmx512M -Xms512M'
    volumes:
      - ./data/kafka-3:/var/lib/kafka/data
    networks:
      - cmdb-kafka-net
    restart: unless-stopped
    healthcheck:
      test:
        [
          'CMD',
          'kafka-broker-api-versions',
          '--bootstrap-server',
          'localhost:9092',
        ]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  # ============================================================================
  # Topic Initialization Service (creates CMDB topics on startup)
  # Supports KAFKA_CREATE_TOPICS environment variable for custom topics
  # Format: "topic1:partitions:replication:retention_ms,topic2:partitions:replication:retention_ms"
  # Example: "my-topic:3:2:604800000,another-topic:3:2"
  # ============================================================================
  kafka-init:
    image: apache/kafka:4.2.1
    hostname: kafka-init
    container_name: cmdb-kafka-init
    depends_on:
      kafka-broker-1:
        condition: service_healthy
      kafka-broker-2:
        condition: service_healthy
      kafka-broker-3:
        condition: service_healthy
    environment:
      KAFKA_BOOTSTRAP_SERVERS: 'kafka-broker-1:9092,kafka-broker-2:9092,kafka-broker-3:9092'
      # Optional: Create additional topics on startup
      # Format: "topic_name:partitions:replication_factor[:retention_ms]"
      # Example: "custom-topic:3:2:604800000,my-queue:1:2"
      # - retention_ms is optional (default: 604800000 = 7 days)
      # - Separate multiple topics with commas
      KAFKA_CREATE_TOPICS: ''
      # Set to "true" to skip CMDB default topics
      KAFKA_SKIP_DEFAULT_TOPICS: 'false'
    volumes:
      - ./scripts:/scripts
    entrypoint: /bin/sh
    command:
      ['-c', 'sleep 30 && /scripts/create-topics.sh && tail -f /dev/null']
    networks:
      - cmdb-kafka-net
    restart: on-failure

  # ============================================================================
  # Kafka UI - Web Management Interface
  # ============================================================================
  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    hostname: kafka-ui
    container_name: cmdb-kafka-ui
    ports:
      - '9095:8080'
    environment:
      KAFKA_CLUSTERS_0_NAME: 'cmdb-kafka'
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: 'kafka-broker-1:9092,kafka-broker-2:9092,kafka-broker-3:9092'
      KAFKA_CLUSTERS_0_PROTOCOL: 'PLAINTEXT'
      KAFKA_CLUSTERS_0_METRICS_PORT: '9999'
      # Optional: if you enable schema registry later
      # KAFKA_CLUSTERS_0_SCHEMAREGISTRY: "http://schema-registry:8081"
      # KAFKA_CLUSTERS_0_KAFKACONNECT: "http://kafka-connect:8083"
    depends_on:
      kafka-broker-1:
        condition: service_healthy
    networks:
      - cmdb-kafka-net
    restart: unless-stopped

# ============================================================================
# Docker Network
# ============================================================================
networks:
  cmdb-kafka-net:
    name: cmdb-kafka-net
    driver: bridge
