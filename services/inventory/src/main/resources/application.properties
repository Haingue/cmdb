info.application.name=InventoryService
info.application.version=@project.version@
spring.application.name=${info.application.name}
spring.application.version=${info.application.version}

## Spring Security ##
# spring.security.user.label=${SECURITY_USER}
# spring.security.user.password=${SECURITY_PASSWORD}

## Logger configuration ##
logging.level.root=debug
logging.level.org.springframework.security=info
logging.level.com.management.cmdb.services.inventory=debug

## Actuator properties ##
springdoc.show-actuator=true
springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
management.endpoints.web.exposure.include=*
management.endpoint.info.access=read_only
management.info.env.enabled=true
# Tracing properties #
spring.sleuth.enabled=true
spring.sleuth.propagation.type=W3C

## Database properties ##
spring.data.mongodb.host=${DB_HOST:localhost}
spring.data.mongodb.port=${DB_PORT:27017}
spring.data.mongodb.database=${DB_DATABASE:inventory}
spring.data.mongodb.username=${DB_USERNAME:admin}
spring.data.mongodb.password=${DB_PASSWORD:password}

## AI MCP ##
spring.ai.mcp.server.name=item-mcp-server
spring.ai.mcp.server.version=0.0.1
spring.ai.mcp.server.sse-endpoint=/mcp/sse