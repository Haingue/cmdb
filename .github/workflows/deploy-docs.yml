name: Deploy Documentation to GitHub Pages

# Déclenche le workflow quand on push sur main ou develop
on:
  push:
    branches: ['main', 'develop']
    # Seulement si des fichiers dans docs/ ont été modifiés
    paths:
      - 'docs/**'
      - '.github/workflows/deploy-docs.yml'

# Permissions nécessaires pour déployer sur GitHub Pages
permissions:
  contents: read
  pages: write
  id-token: write

# Environnement pour GitHub Pages
environment:
  name: github-pages
  url: ${{ steps.deployment.outputs.page_url }}

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: 'docs/package-lock.json'

      - name: Install dependencies
        working-directory: docs
        run: npm ci

      - name: Build documentation
        working-directory: docs
        # Pour GitHub Pages, le base est /cmdb/ (nom du repo)
        # Pour tester localement: BASE_URL= npm run build
        run: npm run build

      - name: Setup Pages
        uses: actions/configure-pages@v4
        with:
          # Permet de deployer depuis n'importe quelle branche
          enablement: true

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          # Upload le dossier de build d'Astro
          path: docs/dist

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
        
